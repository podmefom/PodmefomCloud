<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/logo.jpg" />
    <link rel="stylesheet" href="src/css/main-page.css">
    <link rel="stylesheet" href="src/css/base.css">
    <link rel="stylesheet" href="src/css/layout.css">
    <link rel="stylesheet" href="src/css/library.css">
    <link rel="stylesheet" href="src/css/track-view.css">
    <link rel="stylesheet" href="src/css/add-track.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <title>www.podmefom.com</title>
  </head>
  <body>
    <header>
        <div class="header-content">
            <h1 class="header-logo">PODMEFOM</h1>
            
            <nav class="main-nav">
                <button class="nav-link" data-page="add-track">
                    <i class="fas fa-plus-circle"></i> Создать трек
                </button>
                <button class="nav-link" id="user-profile-btn" data-page ="profile">
                    <i class="fas fa-user-circle"></i> <span id="user-btn-text">Войти</span>
                </button>
            </nav>
        </div>
    </header>



    <main id="app"> <!-- Здесь блять будут внедрены странцы, которые как бы будут соединять все -->

    </main>


    <div class="bottom-player">
        <div class="player-info">
            <img src="" alt="" class="current-track-img"> 
            <div class="current-track-details">
                <div class="track-title-container">
                    <h4 class="current-track-title">Выберите трек</h4>
                </div>
                <p class="current-track-artist">-</p>
            </div>
        </div>

        <div class="player-center-block">
            <div class="player-controls">
                <button id="prev-btn"><i class="fas fa-step-backward"></i></button>
                <button id="main-play-btn"><i class="fas fa-play"></i></button>
                <button id="next-btn"><i class="fas fa-step-forward"></i></button>
            </div>
            
            <div class="player-time-line">
                <span class="current-time time-display">0:00</span>
                <input type="range" id="progress-bar" min="0" max="1" step="0.001" value="0">
                <span class="total-duration time-display">0:00</span>
            </div>
        </div>

        <div class="player-volume">
            <i class="fas fa-volume-up"></i>
            <input type="range" id="global-volume" min="0" max="1" step="0.01" value="0.5">
        </div> 
    </div>
    
    
    <section class="auth-view">
        <div class="auth-container">
            <div class="auth-card">
                <button id="close-auth" class="close-auth-btn">&times;</button>
                <div class="auth-logo">
                    <i class="fas fa-headphones-alt"></i>
                    <h1>PODMEFOM<span>CLOUD</span></h1>
                </div>
                
                <div class="auth-tabs">
                    <button class="auth-tab active" id="btn-login-tab">Вход</button>
                    <button class="auth-tab" id="btn-register-tab">Регистрация</button>
                </div>

                <form id="auth-form">
                    <div class="input-group">
                        <label>Email</label>
                        <input type="email" id="auth-email" placeholder="example@mail.com" required>
                    </div>
                    <div class="input-group">
                        <label>Пароль</label>
                        <input type="password" id="auth-password" placeholder="••••••••" required>
                    </div>
                    
                    <button type="submit" class="auth-submit-btn">
                        <span id="auth-btn-text">Войти в аккаунт</span>
                    </button>
                </form>

                <form id="register-form" style="display: none;">
                    <div class="input-group">
                        <label>Email</label>
                        <input type="email" id="reg-email" placeholder="example@mail.com" required>
                    </div>

                    <div class="input-group">
                        <label>Имя пользователя</label>
                        <input type="username" id="reg-username" placeholder="username" required>
                    </div>

                    <div class="input-group">
                        <label>Пароль</label>
                        <input type="password" id="reg-password" placeholder="••••••••" required>
                    </div>

                    <div class="input-group">
                        <label>Подтвердите пароль</label>
                        <input type="password" id="reg-password-confirm" placeholder="••••••••" required>
                    </div>
                    
                    <button type="submit" class="reg-submit-btn">
                        <span id="reg-btn-text">Создать аккаунт</span>
                    </button>
                </form>

                <p class="auth-footer">Продолжая, вы соглашаетесь с тем, что музыка — это жизнь 🤘</p>
            </div>
        </div>
    </section>


    <div id="player-storage">

    </div>
    
    <script src="https://kit.fontawesome.com/c20d506928.js" crossorigin="anonymous"></script>
    <script type="module" src="/src/main.js"></script>
    <script type="module" src="/src/router.js"></script>
    <script type="module" src="/src/visualizer.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script type="module" src="/src/auth.js"></script>
  </body>
</html>
