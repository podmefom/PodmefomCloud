<section id="track-details-page" class="track-page-view">
    <div class="container-detail">
        <button class="back-btn">
            <i class="fas fa-arrow-left"></i> Назад
        </button>

        <div class="track-content-full">
            <div class="track-hero">
                <canvas id="visualizer"></canvas>
                <div class="hero-img-wrapper">
                    <img src="" alt="Cover" class="full-track-cover">
                </div>
                <div class="track-hero-info">
                    <h1 class="full-track-title">Название трека</h1>
                    <h2 class="full-track-artist">Исполнитель</h2>
                    
                    <div class="track-actions">
                        <button class="action-btn play-main">
                            <i class="fas fa-play"></i> Слушать
                        </button>
                        <button class="action-btn like-main">
                            <i class="fa-regular fa-heart"></i>
                        </button>
                        <button class="action-btn share-main">
                            <i class="fas fa-share"></i>
                        </button>
                    </div>
                </div>
            </div>

            <div class="track-info-grid">
                <div class="track-description">
                    <h3>О треке</h3>
                    <p class="description-text">
                        Здесь будет описание твоего бита или трека, история создания или технические характеристики (BPM, тональность).
                    </p>
                </div>

                <div class="track-lyrics-section">
                    <h3>Текст / Дополнительно</h3>
                    <div class="lyrics-box">
                        Здесь можно разместить текст песни или, если это бит, условия лицензии.
                    </div>
                </div>
            </div>
        </div>
    </div>
</section>
